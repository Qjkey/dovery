html, body {
    margin: 0;
    padding: 0;
    height: 100dvh; 
    width: 100vw;
    overflow: hidden;
    position: fixed;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

.hidden {
    display: none !important;
}

.dust {
    position: absolute;
    pointer-events: none;
    z-index: 9999;
    transition: transform 1.5s cubic-bezier(0.22, 0.61, 0.36, 1), opacity 1.5s ease-out;
}

.app-wrapper {
  display: flex;
  width: 100vw;
  height: 100dvh;
  background: var(--tg-theme-bg-color);
}

/* ПК И ПЛАНШЕТЫ */
@media (min-width: 700px) {
  .sidebar {
    width: 350px;
    border-right: 1px solid var(--tg-theme-section-separator-color);
    flex-shrink: 0;
    height: 100%;
    overflow-y: auto;
  }
  .chat-window {
    flex-grow: 1;
    height: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .back-btn {
    display: none;
  }
}

/* ТЕЛЕФОНЫ */
@media (max-width: 700px) {
  .sidebar, .chat-window {
    width: 100%;
    height: 100%;
  }
  .chat-window {
    display: none;
  }
  .app-wrapper.is-chat-open .sidebar {
    display: none;
  }
  .app-wrapper.is-chat-open .chat-window {
    display: flex;
    flex-direction: column;
  }
}

.empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--tg-theme-hint-color);
  background-color: #f9f9f9;
  font-size: 1.1em;

.chat-active-content {

    height: 100vh;

}

/* ИСПРАВЛЕННЫЙ HEADER */
.chat-header {

    background: var(--tg-theme-bg-color);
    z-index: 10;
    flex-shrink: 0; /* Чтобы не сжимался */
}

  const app = document.getElementById('app');

  const chatContent = document.getElementById('chat-active-content');

  if (isSelected) {
    app.classList.add('is-chat-open');
    emptyState.style.display = 'none';
    chatContent.style.display = 'flex';

    app.classList.remove('is-chat-open');
    if (window.innerWidth > 700) {
        emptyState.style.display = 'flex';
        chatContent.style.display = 'none';
    }
  }
}

<script>
async function get_public_key(pem) {
    const b64 = pem.replace(/-----BEGIN PUBLIC KEY-----|-----END PUBLIC KEY-----|\n|\r/g, '');
    const binary = window.atob(b64);
    const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));

    return await window.crypto.subtle.importKey(
        "spki",
        bytes,
        { name: "ECDH", namedCurve: "P-256" },
        true,
        []
    );
}

async function get_private_key() {
    return new Promise((resolve, reject) => {
        const DB_NAME = 'Dovery'; 
        const STORE_NAME = 'secrets';

        const request = indexedDB.open(DB_NAME);

        request.onerror = () => reject("Ошибка в открытии IndexedDB");
        
        request.onsuccess = (event) => {
            const db = event.target.result;
            const transaction = db.transaction(STORE_NAME, "readonly");
            const store = transaction.objectStore(STORE_NAME);
            const getRequest = store.get("private_key");

            getRequest.onsuccess = () => resolve(getRequest.result);
            getRequest.onerror = () => reject("Ошибка извлечения ключа");
        };
    });
}

async function calc_key_chat(myPrivateKey, opponentPublicKey) {
    return await window.crypto.subtle.deriveKey(
        { name: "ECDH", public: opponentPublicKey },
        myPrivateKey,
        { name: "AES-GCM", length: 256 },
        true,
        ["encrypt", "decrypt"]
    );
}
</script>

<script>
let debounceTimer;

// --- ФУНКЦИИ ПОИСКА ---

function openSearch() {
    document.getElementById('div-classic').style.display = 'none';
    document.getElementById('search-panel').classList.remove('hidden');
    document.getElementById('search-field').focus();
}

function closeSearch() {
    document.getElementById('search-panel').classList.add('hidden');
    document.getElementById('div-classic').style.display = 'block';
    document.getElementById('search-field').value = '';
    document.getElementById('search-results').innerHTML = '';
}

document.getElementById('search-field').addEventListener('input', function(e) {
    const query = e.target.value.trim();
    clearTimeout(debounceTimer);
    
    if (query.length < 2) {
        document.getElementById('search-results').innerHTML = '';
        return;
    }

    debounceTimer = setTimeout(() => {
        fetchUsers(query);
    }, 500); 
});

async function fetchUsers(query) {
    try {
        const response = await fetch(`/search_users?q=${encodeURIComponent(query)}`);
        const users = await response.json();
        renderResults(users);
    } catch (err) {
        console.error("Ошибка поиска:", err);
    }
}

function renderResults(users) {
    const container = document.getElementById('search-results');
    container.innerHTML = '';

    if (users.length === 0) {
        container.innerHTML = '<p class="body1" style="padding:10px 0px 0px 20px; color:var(--tg-theme-hint-color);">Ничего не найдено</p>';
        return;
    }

    users.forEach(user => {
        const div = document.createElement('div');
        div.className = 'item clicked';
        // Подставил user.ava и user.name из твоего JSON
        div.innerHTML = `
            <div class="left"> 
                <img src="static/files/avatars/${user.ava}" class="ava"> 
            </div>
            <div class="right separator">
                <div class="text twoline"> 
                    <div class="label body1">${user.name}</div> 
                    <div class="label subtitle subtitle1">@${user.username}</div> 
                </div>
            </div>
        `;
        // При клике добавляем в список чатов
        div.addEventListener('click', () => {
            startChat(user.id, user.name);
        });
        container.appendChild(div);
    });
}

// --- ЛОГИКА ЧАТОВ ---

async function startChat(userId, userName) {
    try {
        const csrfElement = document.querySelector('meta[name="csrf-token"]');
        const csrfToken = csrfElement.getAttribute('content');
        // Отправляем запрос на сервер, чтобы создать связь в таблице chats
        const response = await fetch('/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken},
            body: JSON.stringify({ user_id: userId })
        });

        if (response.ok) {
            closeSearch();
            await loadMyChats(); // Обновляем список в боковой панели
            await openDirectWindow(userId); // Открываем интерфейс переписки
        }
    } catch (err) {
        console.error("Ошибка при создании чата:", err);
    }
}
const chatsData = {};
async function loadMyChats() {
    try {
        const response = await fetch('/get_my_chats');
        const chats = await response.json();
        const listContainer = document.getElementById('chats-list');
        
        listContainer.innerHTML = ''; 

        chats.forEach(chat => {
            const item = document.createElement('div');
            item.className = 'item clicked';
            chatsData[chat.id] = {
                username: chat.username,
                name: chat.name,
                avatar: chat.avatar,
                publicKey: chat.public_key
            };
            item.setAttribute('data-user-id', chat.id);
            item.innerHTML = `
                <div class="left"> 
                    <img src="static/files/avatars/${chat.avatar}" class="ava"> 
                </div>
                <div class="right separator">
                    <div class="text twoline"> 
                        <div class="label body1">${chat.name}</div> 
                        <div class="label subtitle subtitle1">был(а) недавно</div> 
                    </div>
                </div>
            `;
            item.onclick = async () => {
                await openDirectWindow(chat.id);
            };
            listContainer.appendChild(item);
        });
    } catch (err) {
        console.error("Ошибка загрузки списка чатов:", err);
    }
}

window.onload = () => {
    loadMyChats();
};
// Хранение ключа чата
window.keychat = null;

async function openDirectWindow(userId) {
    const user = chatsData[userId];
    if (!user) { 
        return;
    }

    const headerTitle = document.querySelector('.chat-header .label-header');
    if (headerTitle) headerTitle.innerText = user.name;
    const container = document.getElementById('id_ept');
    container.textContent = userId; 
    const headerAvatar = document.querySelector('.chat-header img.ava');
    if (headerAvatar) {
        headerAvatar.src = `static/files/avatars/${user.avatar}`;
    }

    try {
        const private_key = await get_private_key(); 
        const public_key = await get_public_key(user.publicKey);
        window.keychat = await calc_key_chat(private_key, public_key);

    } catch (err) {
        console.error("Ошибка установки защищенного соединения:", err);
    }
    loadChat(userId);
    toggleChat(true);
}

</script>

<script>
function copy_message(id) {
    // Ищем элемент, у которого data-id совпадает с переданным
    const msgElement = document.querySelector(`[data-id="${id}"]`);
    
    if (msgElement) {
        // Находим внутри него блок с текстом
        const textContent = msgElement.querySelector('.message-content');
        
        if (textContent) {
            const text = textContent.innerText;
            
            navigator.clipboard.writeText(text).then(() => {
                hideDropdown();
            }).catch(err => {
                console.error("Ошибка при копировании:", err);
            });
        } else {
            console.error("Блок .message-content не найден внутри сообщения");
        }
    } else {
        console.error(`Сообщение ${id} не найдено в DOM`);
    }
}

window.snapDelete = async function(id) {
    const cleanId = id.trim();

    if (typeof hideDropdown === 'function') hideDropdown();
    socket.emit('delete_message', { msg_id: cleanId });
};

socket.on('message_deleted', async (data) => {
    if (typeof chatCache !== 'undefined' && chatCache) {
        Object.keys(chatCache).forEach(chatId => {
            const messages = chatCache[chatId].messages;
            if (Array.isArray(messages)) {
                // Фильтруем массив, оставляя только те сообщения, чей ID не совпадает с удаленным
                const initialLength = messages.length;
                chatCache[chatId].messages = messages.filter(msg => String(msg.msg_id) !== String(data.msg_id));
                
                if (messages.length < initialLength) {
                    console.log(`Сообщение удалено из chatCache [${chatId}]`);
                }
            }
        });
    }

    const messageElement = document.querySelector(`[data-id="${data.msg_id}"]`);
    if (messageElement) {
        const wrapper = messageElement.closest('.message-wrapper');
        if (wrapper) {
            try {
                // Использование самого быстрого метода захвата
                const pixels = await htmlToImage.toPixelData(wrapper, { pixelRatio: 1 });
                
                const width = wrapper.offsetWidth;
                const height = wrapper.offsetHeight;
                const rect = wrapper.getBoundingClientRect();

                // Мгновенно скрываем оригинал
                wrapper.style.visibility = 'hidden';

                const layersCount = 20; // Минимум для Android
                const layers = [];
                
                // Создаем слои БЕЗ заполнения пикселей сначала (для скорости)
                for (let i = 0; i < layersCount; i++) {
                    const c = document.createElement('canvas');
                    c.width = width;
                    c.height = height;
                    c.className = 'dust';
                    c.style.cssText = `
                        position: absolute;
                        left: ${rect.left}px;
                        top: ${rect.top + window.scrollY}px;
                        width: ${width}px;
                        height: ${height}px;
                        pointer-events: none;
                        z-index: 9999;
                        transition: transform 0.8s ease-out, opacity 0.6s ease-out;
                    `;
                    document.body.appendChild(c);
                    layers.push({ c, ctx: c.getContext('2d'), imgData: c.getContext('2d').createImageData(width, height) });
                }

                // Быстрое распределение
                for (let i = 0; i < pixels.length; i += 12) { 
                    const x = (i / 4) % width;
                    const lIdx = Math.floor(layersCount * (Math.random() + (2 * x / width)) / 3) % layersCount;
                    const d = layers[lIdx].imgData.data;

                    // Копируем основной пиксель
                    d[i] = pixels[i]; 
                    d[i+1] = pixels[i+1]; 
                    d[i+2] = pixels[i+2]; 
                    d[i+3] = pixels[i+3];
                }

                layers.forEach((l, i) => {
                    l.ctx.putImageData(l.imgData, 0, 0);
                    requestAnimationFrame(() => {
                        const x = (i - layersCount / 2) * 10;
                        const y = 0 - Math.random() * 40;
                        l.c.style.transform = `translate(${x}px, ${y}px) rotate(${(Math.random()-0.5)}rad)`;
                        l.c.style.opacity = '0';
                    });
                    setTimeout(() => l.c.remove(), 1000);
                });

                setTimeout(() => wrapper.remove(), 500);

            } catch (err) {
                wrapper.remove();
            }
        }
    }
});
</script>

const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const messagesArea = document.getElementById('messages-area');

async function encryptText(text) {
    if (!window.keychat) {
        throw new Error("Ключ чата не инициализирован! Сначала открой чат.");
    }
    const encodedText = new TextEncoder().encode(text);
    const iv = window.crypto.getRandomValues(new Uint8Array(12));
    const encryptedContent = await window.crypto.subtle.encrypt(
        { name: "AES-GCM", iv: iv },
        window.keychat,
        encodedText
    );

    const combined = new Uint8Array(iv.length + encryptedContent.byteLength);
    combined.set(iv);
    combined.set(new Uint8Array(encryptedContent), iv.length);

    return btoa(String.fromCharCode(...combined));
}

async function decryptText(encryptedBase64) {
    if (!window.keychat) throw new Error("Ключ не инициализирован");
    const combined = new Uint8Array(atob(encryptedBase64).split("").map(c => c.charCodeAt(0)));
    const iv = combined.slice(0, 12);
    const data = combined.slice(12);

    const decryptedContent = await window.crypto.subtle.decrypt(
        { name: "AES-GCM", iv: iv },
        window.keychat,
        data
    );

    return new TextDecoder().decode(decryptedContent);
}

// --- ФУНКЦИЯ ОТПРАВКИ ---
async function sendMessage() {
    const text = msgInput.value;
    if (!text.trim()) return;

    let encryptedText;
    try {
        encryptedText = await encryptText(text);
    } catch (err) {
        console.error("Шифрование не удалось:", err);
        return;
    }

    const generateId = (len) => {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let result = '';
        const randomValues = new Uint32Array(len);
        window.crypto.getRandomValues(randomValues);
        for (let i = 0; i < len; i++) {
            result += chars[randomValues[i] % chars.length];
        }
        return result;
    };


    const msgId = "msg_" + generateId(15);

    const receiverId = document.getElementById('id_ept').innerText;
    socket.emit('send_direct_message', {
        receiver_id: receiverId,
        text: encryptedText,
        msgId: msgId
    });

    const wrapper = document.createElement('div');
    wrapper.className = 'message-wrapper sent new-msg';

    // 1. Создаем структуру без текста сообщения внутри innerHTML
    wrapper.innerHTML = `
        <div class="message-bubble sent" id="cntxt_menu_btn_03" data-id="${msgId}">
            <div class="message-content body1" style="white-space: pre-wrap;"></div>
            <div class="message-info">
                <span class="message-time caption2">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
            </div>
        </div>
    `;

    // 2. Находим пустой контейнер для контента и безопасно вставляем текст
    // textContent превратит любой <html> в обычную строку текста
    wrapper.querySelector('.message-content').textContent = text;

    if (typeof chatCache !== 'undefined') {
        // Определяем, в какой чат положить сообщение. 
        // Если мы получили сообщение, значит ID чата — это sender_id отправителя.
        const chatId = data.sender_id; 
        
        if (chatCache[chatId]) {
            // Создаем объект сообщения в том же формате, что хранит кэш
            const newCacheMsg = {
                msg_id: data.msg_id,
                sender_id: data.sender_id,
                text: data.text, // сохраняем зашифрованным, как в БД
                time: data.time
            };
            
            // Добавляем в начало или конец (зависит от твоей логики отображения)
            chatCache[chatId].messages.push(newCacheMsg);
            console.log("Сообщение добавлено в chatCache");
        }
    }

    messagesArea.prepend(wrapper);
    
    msgInput.value = '';
    msgInput.style.height = 'auto';
    msgInput.focus();
}

socket.on('new_message', async (data) => {
    try {
        const receiverId = document.getElementById('id_ept').innerText;
        const decryptedText = await decryptText(data.text);
        if (typeof chatCache !== 'undefined') {
            const chatId = data.sender_id; 
            
            if (chatCache[chatId]) {
                const newCacheMsg = {
                    msg_id: data.msg_id,
                    sender_id: data.sender_id,
                    text: data.text,
                    time: data.time
                };
                
                // Добавляем в начало или конец (зависит от твоей логики отображения)
                chatCache[chatId].messages.push(newCacheMsg);
                console.log("Сообщение добавлено в chatCache");
            }
        }

        if (receiverId == data.sender_id) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper received new-msg';
            
            // Вставляем твою структуру
            wrapper.innerHTML = `
                <div class="message-bubble received" id="cntxt_menu_btn_03" data-id="${data.msg_id || ''}">
                    <div class="message-content body1" style="white-space: pre-wrap;"></div>
                    <div class="message-info">
                        <span class="message-time caption2">${data.time || ''}</span>
                    </div>
                </div>
            `;
            wrapper.querySelector('.message-content').textContent = decryptedText;
            messagesArea.prepend(wrapper);
        }
    } catch (err) {
        console.error("Не удалось расшифровать сообщение. Возможно, ключи не совпадают.", err);
    }
});

// Клик по кнопке
sendBtn.addEventListener('click', async () => {
    await sendMessage();
});

// Enter для отправки
msgInput.addEventListener('keydown', async (e) => {
    // Проверяем, что нажата Enter без Shift
    if (e.key === 'Enter' && !e.shiftKey) {
        
        // Добавляем проверку: если ширина экрана больше 1024px (типичный ПК/планшет)
        // или используем проверку на тачскрин
        const isMobile = window.matchMedia("(max-width: 1024px)").matches;

        if (!isMobile) {
            e.preventDefault();
            await sendMessage();
        }
        // Если это мобилка, ничего не делаем — сработает стандартный перенос строки
    }
});

</script>

<script>
const chatCache = {};
async function loadChat(userId) {
    const messagesArea = document.getElementById('messages-area');
    const receiverId = userId;
    if (chatCache[userId]) {
        renderChat(messagesArea, chatCache[userId].messages, receiverId, userId);
        return;
    }
    try {
        // 2. Fetch запрос к серверу
        const response = await fetch(`/get_history_messages/${receiverId}`);
        const messages = await response.json();

        const decryptedMessages = await Promise.all(messages.map(async (msg) => {
            try {
                const text = await decryptText(msg.message_text);
                return { ...msg, decryptedText: text };
            } catch (e) {
                return { ...msg, decryptedText: "[Ошибка расшифровки]" };
            }
        }));
        renderChat(messagesArea, decryptedMessages, receiverId, userId);
    } catch (err) {
        console.error("Ошибка загрузки истории:", err);
    }
}

function renderChat(messagesArea, messages, receiverId, userId) {
    messagesArea.innerHTML = '';
    const fragment = document.createDocumentFragment();
    messages.forEach(msg => {
        const mne = msg.sender_id != receiverId;
        const typeClass = mne ? 'sent' : 'received';

        const wrapper = document.createElement('div');
        wrapper.className = 'message-wrapper ' + typeClass;
        wrapper.innerHTML = `
            <div class="message-bubble ${typeClass}" id="cntxt_menu_btn_03" data-id="${msg.id}">
                <div class="message-content body1" style="white-space: pre-wrap;"></div>
                <div class="message-info">
                    <span class="message-time caption2">${formatTime(msg.time)}</span>
                </div>
            </div>
        `;
        wrapper.querySelector('.message-content').textContent = msg.decryptedText;
        chatCache[userId] = {
            id: userId,
            messages: messages
        };
        console.log(chatCache);
        fragment.prepend(wrapper);
    });

    messagesArea.appendChild(fragment);
    messagesArea.scrollTop = messagesArea.scrollHeight;
}

// Помощник для времени (обрабатывает ISO строку из базы)
function formatTime(timeStr) {
    const date = new Date(timeStr);
    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

</script>

<!-- Копирование/вставить для поля ввода -->
<script>
// Контекстное меню для поля ввода сообщений
const inputField = document.querySelector('#msgInput');
function copy_text() {
    const start = inputField.selectionStart;
    const end = inputField.selectionEnd;
    const selectedText = inputField.value.substring(start, end);

    if (selectedText) {
        navigator.clipboard.writeText(selectedText)
            .then(() => hideDropdown())
            .catch(err => console.error('Ошибка копирования:', err));
            inputField.focus();
    }
}

async function paste_text() {
    try {
        const text = await navigator.clipboard.readText();
        // Вставляем текст в позицию курсора
        const start = inputField.selectionStart;
        const end = inputField.selectionEnd;
        
        inputField.setRangeText(text, start, end, 'end');
        
        hideDropdown();
        inputField.focus();
    } catch (err) {
        console.warn('Доступ к буферу отклонен пользователем' + err);
    }
}


inputField.addEventListener('contextmenu', async function(e) { // Добавили async
    e.preventDefault();

    const selectedText = window.getSelection().toString();
    let hasClipboard = false;

    try {
        // Проверяем наличие текста в буфере
        const clipboardText = await navigator.clipboard.readText();
        hasClipboard = clipboardText.length > 0;
    } catch (err) {
        // Если доступа нет или буфер пуст, просто считаем, что вставить нечего
        hasClipboard = false;
    }

    let items = [];
    if (selectedText) {
        items = list_items_icon_03; // Копировать + Вставить
        if (items.length > 0) {
            showDropdown(this, items, 'icon', { x: e.pageX }, paste=false);
        }
    } else if (hasClipboard) {
        items = list_items_icon_04; // Только Вставить
        if (items.length > 0) {
            showDropdown(this, items, 'icon', { x: e.pageX }, paste=true);
        }
    }
});

</script>
