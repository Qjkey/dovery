<script>
const dbName = "Dovery";
const storeName = "secrets";

function initDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(dbName, 1);

        request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains(storeName)) {
                db.createObjectStore(storeName);
            }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
    });
}

async function saveUserData(userData, privateKey) {
    const db = await initDB();
    const tx = db.transaction(storeName, "readwrite");
    const store = tx.objectStore(storeName);

    store.put(privateKey, "private_key");
    store.put(userData, "user_profile");

    return new Promise((resolve) => {
        tx.oncomplete = () => resolve();
    });
}

async function deriveEncryptionKey(password, username) {
    const encoder = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
        "raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]
    );
    return crypto.subtle.deriveKey(
        {
            name: "PBKDF2",
            salt: encoder.encode(username),
            iterations: 100000,
            hash: "SHA-256"
        },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false, ["decrypt"]
    );
}

async function decryptAndImportKey(encryptedBase64, password, username) {
    const combined = new Uint8Array(atob(encryptedBase64).split("").map(c => c.charCodeAt(0)));
    const iv = combined.slice(0, 12);
    const ciphertext = combined.slice(12);

    const encryptionKey = await deriveEncryptionKey(password, username);

    const decryptedRaw = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: iv },
        encryptionKey,
        ciphertext
    );

    return await window.crypto.subtle.importKey(
        "pkcs8",
        decryptedRaw,
        { 
            name: "ECDH", 
            namedCurve: "P-256" 
        },
        true,
        ["deriveKey", "deriveBits"]
    );
}

async function hashPassword(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function validateAndSubmit(el) {
    const form = el.closest('form'); 
    const usernameInput = form.querySelector('input[name="username"]');
    const passwordInput = form.querySelector('input[name="password"]');
    const csrfInput = form.querySelector('input[name="csrf_token"]');

    const username = usernameInput.value.trim();
    let passwordValue = passwordInput.value.trim();

    if (username === "" || passwordValue === "") {
        d_alert("Ошибка d101", "Введите логин и пароль", "ok");
        return;
    }

    const hashedForServer = await hashPassword(passwordValue);

    const formData = new FormData();
    formData.append('username', username);
    formData.append('password', hashedForServer);
    formData.append('csrf_token', csrfInput.value);

    try {
        const response = await fetch('/login', {
            method: 'POST',
            body: formData
        });

        const data = await response.json();

        if (response.ok && data.status === "success") {
            const privateKeyObject = await decryptAndImportKey(data.priv_key, passwordValue, username);
            passwordValue = null;
            passwordInput.value = "";
            await saveUserData(data.user_data, privateKeyObject);
            window.location.href = "/";
        } else {
            if (data.message === "d102") {
                d_alert("Ошибка d102", "Неверный логин или пароль. Из-за безопасности, чо верно чо нет, сказать не могу:D", "ok");
            } else if (data.message === "d101") {
                d_alert("Ошибка d101", "Введите логин и пароль в поля ввода", "ok");
            } else if (data.message === "d103") {
                d_alert("Ошибка d103", "Ошибка базы данных", "ok");
            }
        }
    } catch (err) {
        console.log(err);
        d_alert("Ошибка d104", `Ошибка сервера ${err}`, "ok");
    }
}
</script>
